# ---------------------------
# Datasource for tests (Postgres)
# ---------------------------
# Test datasource
# Embedded PostgreSQL Konfiguration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/testdb
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# Flyway Konfiguration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=testdb/migration
# Testprofil: OIDC deaktivieren
%test.quarkus.oidc.enabled=false

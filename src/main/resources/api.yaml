openapi: 3.0.4
info:
  title: Shopping List API
  version: 1.0.0
  description: API for managing shopping lists (multi-tenant safe).

paths:
  /shoppingLists:
    get:
      summary: Get all shopping lists
      operationId: getShoppingLists
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingListDto'

    post:
      summary: Create a new shopping list
      operationId: createShoppingList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListDto'
      responses:
        '201':
          description: Shopping list created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListDto'

  /shoppingLists/{listId}:
    get:
      summary: Get a shopping list by ID
      operationId: getShoppingListById
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListDto'
        '404':
          description: Shopping list not found

    put:
      summary: Update a shopping list by ID
      operationId: updateShoppingList
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListDto'
      responses:
        '200':
          description: Shopping list updated

    delete:
      summary: Delete a shopping list
      operationId: deleteShoppingList
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Shopping list deleted

  /shoppingLists/{listId}/shoppingItems:
    post:
      summary: Add an item to a shopping list
      operationId: addShoppingItem
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingItemDto'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingItemDto'


  /shoppingLists/{listId}/shoppingItems/reorderByCommon:
    post:
      summary: Rearrange shopping items within a shopping list
      operationId: reorderByCommon
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Shopping items reordered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListDto'
        '400':
          description: Invalid indices provided
        '404':
          description: Shopping list not found

  /shoppingLists/{listId}/shoppingItems/reorder:
    post:
      summary: Rearrange shopping items within a shopping list
      operationId: rearrangeShoppingItems
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderShoppingItemsRequest'
      responses:
        '200':
          description: Shopping items reordered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListDto'
        '400':
          description: Invalid indices provided
        '404':
          description: Shopping list not found


  /shoppingLists/{listId}/shoppingItems/{itemId}:
    patch:
      summary: Partially update a shopping item
      operationId: updateShoppingItem
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingItemDto'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingItemDto'
        '404':
          description: Item not found
    delete:
      summary: Remove a shopping item from a shopping list
      operationId: removeShoppingItem
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Shopping item removed successfully
        '404':
          description: Shopping item not found

components:
  schemas:
    ShoppingItemDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        product:
          $ref: '#/components/schemas/ProductDto'
        quantity:
          type: number
          format: double
        unit:
          type: string
        checked:
          type: boolean
          default: false
        rank:
          type: integer

    ProductDto:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum:
            - DAIRY
            - MEAT
            - FISH
            - BAKERY
            - FRUITS
            - VEGETABLES
            - BEVERAGES
            - FROZEN
            - DRY_GOODS
            - SWEETS
            - ORGANIC
            - VEGAN
            - ELECTRONICS
            - CLOTHING
            - BOOKS
            - HOME_AND_KITCHEN
            - BEAUTY
            - SPORTS
            - TOYS
            - SPICES
            - AUTOMOTIVE
            - OTHER

    ShoppingListDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        orderStrategy:
          $ref: '#/components/schemas/ProductOrderStrategy'
        shoppingItems:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingItemDto'
        createdAt:
          type: string
          format: date


    ProductOrderStrategy:
      type: string
      description: Strategy used to order products within a shopping list
      enum:
        - STANDARD
        - COMMON_ORDER


    ReorderShoppingItemsRequest:
      type: object
      required:
        - fromIndex
        - toIndex
      properties:
        fromIndex:
          type: integer
          minimum: 0
          description: Original index of the item
        toIndex:
          type: integer
          minimum: 0
          description: Target index of the item
